services:
  postgres:
    image: postgres:16-alpine
    container_name: projectmind-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projectmind}
      POSTGRES_USER: ${POSTGRES_USER:-projectmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projectmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projectmind} -d ${POSTGRES_DB:-projectmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: projectmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectmind-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/projectmind}
      DB_USERNAME: ${DB_USERNAME:-projectmind}
      DB_PASSWORD: ${DB_PASSWORD:-projectmind}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-at-least-32-chars}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}
      JWT_ISSUER: ${JWT_ISSUER:-projectmind-api}
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  postgres_data:
  redis_data:
